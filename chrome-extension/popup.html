<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>LinuxDoScanner Bridge</title>
    <link rel="icon" href="icons/icon32.png">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <section class="panel hero-panel">
        <div class="hero-top">
          <div class="brand">
            <img class="brand-logo" src="icons/icon128.png" alt="LinuxdoScanner Logo">
            <div class="brand-copy">
              <p class="eyebrow">Linux.do Monitor Console</p>
              <h1>同步控制台</h1>
            </div>
          </div>
          <button id="openOptionsButton" class="ghost quick-action" type="button">AI 设置</button>
        </div>

        <div class="hero-pill-row">
          <article id="sessionStatePill" class="hero-pill" data-status="unknown">
            <span class="status-dot" aria-hidden="true"></span>
            <div>
              <span class="hero-pill-label">浏览器会话</span>
              <strong id="loggedIn">未知</strong>
            </div>
          </article>
        </div>

        <section class="status-grid" aria-label="同步摘要">
          <article class="status-card">
            <span class="label">最近同步</span>
            <strong id="lastSyncAt">暂无</strong>
            <p>快速确认本地桥接最近一次完成写入的时间。</p>
          </article>
          <article class="status-card">
            <span class="label">最近入库</span>
            <strong id="lastSyncCount">0</strong>
            <p>显示上次同步新增保存到本地服务的主题数量。</p>
          </article>
        </section>
      </section>

      <section id="syncProgressPanel" class="panel progress-panel" hidden>
        <div class="progress-header">
          <div>
            <div id="syncProgressLabel" class="panel-title progress-title">准备同步</div>
            <p id="syncProgressDetail" class="progress-detail">正在等待后台响应</p>
          </div>
          <strong id="syncProgressPercent">0%</strong>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div id="syncProgressFill" class="progress-fill"></div>
        </div>
      </section>

      <section id="aiSummaryCard" class="panel section-card" data-ready="draft">
        <div class="detail-grid">
          <article class="detail-card">
            <span class="detail-label">当前模型</span>
            <strong id="selectedModel">未配置</strong>
          </article>
          <article class="detail-card detail-card-wide">
            <span class="detail-label">Base URL</span>
            <strong id="baseUrl">未配置</strong>
          </article>
          <article class="detail-card detail-card-wide">
            <span class="detail-label">关注点</span>
            <div id="focusKeywords" class="chip-group" aria-live="polite">未配置</div>
          </article>
        </div>
      </section>

      <section id="alertCard" class="panel alert-card" data-tone="neutral">
        <div class="alert-stack">
          <article class="alert-box" role="alert" aria-live="assertive">
            <span class="detail-label">同步错误</span>
            <p id="lastError">无</p>
          </article>
        </div>
      </section>

      <div class="actions">
        <button id="syncButton" type="button">立即同步</button>
        <button id="clearCrawlDataButton" class="danger" type="button">清空抓取库</button>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
