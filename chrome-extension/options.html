<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>LinuxDoScanner 设置</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <div>
          <p class="eyebrow">LinuxDoScanner Bridge</p>
          <h1>设置中心</h1>
          <p class="description">配置本地桥接与 AI 模型识别。余额同步本次不启用，仅同步模型列表。</p>
        </div>
      </header>

      <section class="card">
        <div class="card-title">本地桥接</div>
        <label class="field">
          <span>本地服务地址</span>
          <input id="serverUrl" type="text" placeholder="http://127.0.0.1:8765">
        </label>
        <label class="field">
          <span>桥接 Token</span>
          <input id="bridgeToken" type="text" placeholder="可留空">
        </label>
        <div class="grid">
          <label class="field">
            <span>轮询间隔（分钟）</span>
            <input id="intervalMinutes" type="number" min="1" step="1">
          </label>
          <div class="field toggle-field">
            <span>自动同步</span>
            <label class="switch">
              <input id="syncEnabled" type="checkbox">
              <span>启用</span>
            </label>
          </div>
        </div>
        <div class="actions compact">
          <button id="saveBridgeButton" type="button">保存桥接设置</button>
        </div>
      </section>

      <section class="card">
        <div class="card-title">AI 配置</div>
        <div class="grid">
          <label class="field">
            <span>Provider Type</span>
            <select id="providerType">
              <option value="openai_compatible">openai_compatible</option>
              <option value="newapi">newapi</option>
            </select>
          </label>
          <label class="field">
            <span>当前模型缓存数</span>
            <input id="modelCount" type="text" readonly>
          </label>
        </div>

        <label class="field">
          <span>Base URL</span>
          <input id="baseUrl" type="text" placeholder="https://api.openai.com/v1 或 https://your-newapi.example">
        </label>

        <label class="field">
          <span>API Key</span>
          <input id="apiKey" type="password" placeholder="sk-...">
        </label>

        <label class="field">
          <span>Selected Model</span>
          <input id="selectedModel" type="text" list="availableModels" placeholder="例如 openai/gpt-oss-120b">
          <datalist id="availableModels"></datalist>
        </label>

        <div class="status-block">
          <div><strong>最近模型同步：</strong><span id="lastModelSyncAt">暂无</span></div>
          <div><strong>模型同步错误：</strong><span id="lastModelSyncError">无</span></div>
        </div>

        <div class="section-label">关注点配置</div>
        <label class="field">
          <span>关注关键词</span>
          <textarea id="focusKeywords" rows="3" placeholder="支持逗号或换行分隔，例如：羊毛, 福利, 优惠, 公益站"></textarea>
        </label>

        <label class="field">
          <span>关注说明</span>
          <textarea id="focusPrompt" rows="4" placeholder="用自然语言描述你真正想关注的内容，以及哪些标题党、求助贴、闲聊贴不要误判。"></textarea>
        </label>

        <label class="field">
          <span>通知说明</span>
          <textarea id="notificationPrompt" rows="3" placeholder="可选：描述什么样的命中值得触发 Windows 通知，例如强调时效性、直接收益、可执行路径。"></textarea>
        </label>

        <div class="actions">
          <button id="saveAiButton" type="button">保存 AI 配置</button>
          <button id="syncModelsButton" class="secondary" type="button">同步模型</button>
        </div>
      </section>

      <section class="card status-card">
        <div class="card-title">最近同步状态</div>
        <div><strong>登录状态：</strong><span id="loggedIn">未知</span></div>
        <div><strong>最近同步：</strong><span id="lastSyncAt">暂无</span></div>
        <div><strong>最近入库：</strong><span id="lastSyncCount">0</span></div>
        <div><strong>最近错误：</strong><span id="lastError">无</span></div>
      </section>

      <section class="card">
        <div class="card-title">飞书通知</div>
        <p class="description compact-description">先在系统里完成 `lark-cli` 初始化与飞书授权，再在这里保存接收目标。群通知填 Chat ID，私聊通知填 User ID，二选一即可。</p>

        <div class="grid">
          <div class="field toggle-field">
            <span>启用飞书通知</span>
            <label class="switch">
              <input id="feishuEnabled" type="checkbox">
              <span>启用</span>
            </label>
          </div>
          <label class="field">
            <span>Lark CLI 路径</span>
            <input id="larkCliPath" type="text" placeholder="默认自动检测，例如 C:\Program Files\nodejs\lark-cli.cmd">
          </label>
        </div>

        <label class="field">
          <span>Feishu Chat ID</span>
          <input id="feishuChatId" type="text" placeholder="群通知，例如 oc_xxx">
        </label>

        <label class="field">
          <span>Feishu User ID</span>
          <input id="feishuUserId" type="text" placeholder="私聊通知，例如 ou_xxx">
        </label>

        <div class="actions">
          <button id="saveFeishuButton" type="button">保存飞书配置</button>
          <button id="testFeishuButton" class="secondary" type="button">发送测试消息</button>
        </div>
        <div class="status-block">
          <div><strong>飞书状态：</strong><span id="feishuStatus">未配置</span></div>
        </div>
      </section>

      <section class="card danger-card">
        <div class="card-title">危险操作</div>
        <p class="danger-text">一键清空当前爬取主题、通知状态和抓取游标。不会删除 AI 配置、API Key、模型缓存。</p>
        <div class="actions compact">
          <button id="clearCrawlDataButton" class="danger" type="button">清空爬取数据库</button>
        </div>
      </section>
    </main>

    <script src="options.js"></script>
  </body>
  </html>
