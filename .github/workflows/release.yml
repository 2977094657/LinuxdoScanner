name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-backend:
    name: Build Backend
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync Dependencies
        run: uv sync --extra build

      - name: Build Windows Backend
        run: uv run python scripts/build_windows_exe.py

      - name: Package Backend Archive
        run: uv run python scripts/package_backend.py --tag "${{ github.ref_name }}" --output-dir dist

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-release
          path: dist/LinuxDoScannerBackend-${{ github.ref_name }}-windows-x64.zip
          if-no-files-found: error

  package-extension:
    name: Package Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Package Chrome Extension
        run: python scripts/package_extension.py --tag "${{ github.ref_name }}" --output-dir dist

      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-release
          path: dist/LinuxDoScannerExtension-${{ github.ref_name }}.zip
          if-no-files-found: error

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-backend
      - package-extension

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Show Release Files
        run: find release-artifacts -maxdepth 3 -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-artifacts/backend-release/*
            release-artifacts/extension-release/*
